<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🛒 Cart & Payment - Girls Fit</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
</head>
<script>
  // Firebase already initialized by firebase-config.js

  function updateNav(user) {
    const navBar = document.getElementById('navBar');
    if (user) {
      const ordersLink = user.email === 'm.abbas.askri@gmail.com' ?
        '<a href="admin.html">👩‍💼 Admin</a>' :
        '<a href="orders.html">My Orders</a>';
      navBar.innerHTML = `
        <a href="index.html">Home</a>
        <a href="handbags.html">Handbags</a>
        <a href="pouches.html">Makeup Pouches</a>
        <a href="returns.html">Returns & Refunds</a>
        ${ordersLink}
        <a href="cart.html" class="active">🛒 Cart</a>
        <a href="javascript:void(0)" onclick="logoutUser()" style="background:#ff5c8a;">Logout (${user.email})</a>
      `;
    }
  }

  function updateProfileIcon(user) {
    const icon = document.getElementById('profileIcon');
    const dropdown = document.getElementById('dropdownMenu');
    if (user) {
      icon.innerText = '👤';
      icon.title = user.email;
      dropdown.innerHTML = `
        <a href="${user.email === 'm.abbas.askri@gmail.com' ? 'admin.html' : 'orders.html'}">
          ${user.email === 'm.abbas.askri@gmail.com' ? '👩‍💼 Admin Panel' : '📦 My Orders'}
        </a>
        <a href="javascript:void(0)" onclick="logoutUser()">🚪 Logout</a>
      `;
    } else {
      icon.innerText = '👤';
      icon.title = 'Sign In';
      dropdown.innerHTML = `
        <a href="javascript:void(0)" onclick="signInWithGoogle()" class="google-btn">
          <span class="google-icon" style="color:#4285f4;">G</span> Continue with Google
        </a>
      `;
    }
  }

  window.toggleDropdown = function() {
    const dropdown = document.getElementById('dropdownMenu');
    dropdown.classList.toggle('show');
  }

  window.onclick = function(event) {
    if (!event.target.matches('.profile-icon')) {
      const dropdowns = document.getElementsByClassName('dropdown-menu');
      for (let i = 0; i < dropdowns.length; i++) {
        dropdowns[i].classList.remove('show');
      }
    }
  }

  window.signInWithGoogle = function() {
    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
      .then((result) => {
        const user = result.user;
        window.currentFirebaseUser = user;
        if (user.email === 'm.abbas.askri@gmail.com') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'cart.html';
        }
      })
      .catch((error) => {
        console.error("Google sign-in error:", error);
      });
  };

  window.logoutUser = function() {
    firebase.auth().signOut().then(() => {
      window.location.href = "login.html";
    });
  };

  window.showCart = function() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const list = document.getElementById('cartList');
    const total = document.getElementById('cartTotal');
    const checkout = document.getElementById('checkoutSection');
    const emptyMsg = document.getElementById('emptyCartMsg');

    if (cart.length === 0) {
      list.innerHTML = "";
      total.innerText = "";
      checkout.style.display = "none";
      emptyMsg.innerText = "Your cart is empty 🛒 Start shopping!";
      return;
    }

    let sum = 0;
    list.innerHTML = "";
    cart.forEach((item, i) => {
      list.innerHTML += `<li>${i+1}. ${item.name} — <b>₨${item.price}</b> <button onclick="removeItem(${i})" style="background:#ff5c8a;color:white;border:none;padding:4px 10px;border-radius:10px;cursor:pointer;margin-left:10px;">Remove</button></li>`;
      sum += item.price;
    });
    total.innerText = "Total: ₨" + sum;
    checkout.style.display = "block";
    emptyMsg.innerText = "";
  }

  window.removeItem = function(index) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    cart.splice(index, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    showCart();
  };

  window.processPayment = function(e) {
    e.preventDefault();
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    if (cart.length === 0) {
      alert("Your cart is empty!");
      return;
    }

    const user = window.currentFirebaseUser;
    const name = document.getElementById('fullName').value;
    const phone = document.getElementById('phone').value;
    const address = document.getElementById('address').value;
    const total = cart.reduce((sum, item) => sum + item.price, 0);

    const orders = getOrders();
    const lastId = orders.length > 0 ? parseInt(orders[orders.length - 1].id?.slice(1) || 1000) : 1000;

    cart.forEach((item, index) => {
      orders.push({
        id: `#${lastId + index + 1}`,
        customerName: name,
        customerEmail: user.email,
        customerPhone: phone,
        address: address,
        productName: item.name,
        price: item.price,
        date: new Date().toISOString().split('T')[0],
        status: 'pending'
      });
    });

    saveOrders(orders);
    alert("✅ Order Placed Successfully! Thank you " + name + ". Your total of ₨" + total + " will be collected on delivery.");
    localStorage.removeItem('cart');
    showCart();
  };

  // Auth handling that waits for persistence to restore before acting on null
  let authHandled = false;
  firebase.auth().onAuthStateChanged((user) => {
    if (authHandled) return;
    if (user) {
      authHandled = true;
      window.currentFirebaseUser = user;
      updateProfileIcon(user);
      updateNav(user);
      showCart();
    } else {
      setTimeout(() => {
        if (!authHandled) {
          authHandled = true;
          const persistedUser = firebase.auth().currentUser;
          window.currentFirebaseUser = persistedUser;
          updateProfileIcon(persistedUser);
          if (persistedUser) {
            updateNav(persistedUser);
          }
          showCart();
        }
      }, 1500);
    }
  });
</script>

</body>
</html>
