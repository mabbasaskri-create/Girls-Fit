<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔐 Sign In - Girls Fit</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>

<header style="position:relative;">
  <h1>💖 Girls Fit 💖</h1>
</header>

<section class="products" style="max-width:500px;">
  <div style="text-align:center;margin-bottom:30px;">
    <div style="font-size:4em;">💖</div>
    <p style="color:#ff5c8a;font-size:1.2em;font-weight:bold;">Girls Fit</p>
  </div>
  <h2>🔐 Sign In</h2>
  <div class="policy-box" style="text-align:center;">
    <p style="margin-bottom:20px;color:#666;">Sign in with Google:</p>

    <!-- Google Sign In Button -->
    <button onclick="signInWithGoogle()" style="background:white;border:2px solid #ffc1d6;padding:12px 20px;border-radius:25px;cursor:pointer;font-weight:bold;font-size:1em;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:15px;transition:0.3s;">
      <span style="color:#4285f4;font-size:1.2em;font-weight:bold;">G</span> Continue with Google
    </button>

    <div style="margin:20px 0;color:#ccc;">— OR —</div>

    <!-- Email/Password Form -->
    <form id="loginForm">
      <p><b>Email Address</b></p>
      <input type="email" id="loginEmail" required placeholder="Enter your email" style="width:100%;padding:10px;margin:8px 0;border:2px solid #ffc1d6;border-radius:10px;">

      <p><b>Password</b></p>
      <input type="password" id="loginPassword" required placeholder="Enter your password" style="width:100%;padding:10px;margin:8px 0;border:2px solid #ffc1d6;border-radius:10px;">

      <div id="adminNote" style="display:none;background:#fff0f5;padding:10px;border-radius:10px;margin:10px 0;">
        <p>✨ Admin email detected! You will have full access to the admin panel.</p>
      </div>

      <p id="errorMsg" style="color:#f44336;display:none;margin-top:10px;"></p>

      <button type="submit" style="background:#ff8ab3;color:white;border:none;padding:14px 30px;border-radius:25px;cursor:pointer;font-weight:bold;font-size:1.1em;margin-top:15px;width:100%;">Sign In with Email</button>
    </form>
  </div>
</section>

<footer><p>© 2025 Girls Fit 💖 All rights reserved</p></footer>

<script>
  // Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyDwdHkfb9DBVV5oLYw1WaEPfVN1_MYm30Y",
    authDomain: "girls-67c84.firebaseapp.com",
    projectId: "girls-67c84",
    storageBucket: "girls-67c84.firebasestorage.app",
    messagingSenderId: "87884221171",
    appId: "1:87884221171:web:12f70ce888930fe1ab4586",
    measurementId: "G-SRPHVVDZWK"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Google Sign In
  window.signInWithGoogle = function() {
    console.log("Google sign-in button clicked");
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({
      prompt: 'select_account'
    });
    
    auth.signInWithPopup(provider)
      .then((result) => {
        const user = result.user;
        window.currentFirebaseUser = user;
        console.log("Sign-in success:", user.email);

        if (user.email === 'm.abbas.askri@gmail.com') {
          window.location.href = "admin.html";
        } else {
          window.location.href = "index.html";
        }
      })
      .catch((error) => {
        console.error("Google sign-in error:", error);
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.innerText = "Google sign-in failed: " + error.message;
        errorMsg.style.display = 'block';
      });
  }

  // Email input listener
  document.getElementById('loginEmail').addEventListener('input', function() {
    const adminNote = document.getElementById('adminNote');
    if (this.value === 'm.abbas.askri@gmail.com') {
      adminNote.style.display = 'block';
    } else {
      adminNote.style.display = 'none';
    }
  });

  // Email/password login
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const errorMsg = document.getElementById('errorMsg');

    if (!email || !password) {
      errorMsg.innerText = "Please enter both email and password";
      errorMsg.style.display = 'block';
      return;
    }

    auth.signInWithEmailAndPassword(email, password)
      .then((userCredential) => {
        const user = userCredential.user;
        window.currentFirebaseUser = user;
        console.log("Login success:", user.email);

        if (user.email === 'm.abbas.askri@gmail.com') {
          window.location.href = "admin.html";
        } else {
          window.location.href = "index.html";
        }
      })
      .catch((error) => {
        console.error("Login error:", error);
        errorMsg.innerText = "Login failed: " + error.message;
        errorMsg.style.display = 'block';
      });
  });

  // Auth handling that waits for persistence to restore before acting on null
  let authHandled = false;
  auth.onAuthStateChanged((user) => {
    if (authHandled) return;
    if (user) {
      authHandled = true;
      window.currentFirebaseUser = user;
      console.log("User already logged in:", user.email);
      if (user.email === 'm.abbas.askri@gmail.com') {
        window.location.href = "admin.html";
      } else {
        window.location.href = "index.html";
      }
    } else {
      setTimeout(() => {
        if (!authHandled) {
          authHandled = true;
          const persistedUser = auth.currentUser;
          if (persistedUser) {
            window.currentFirebaseUser = persistedUser;
            console.log("User already logged in:", persistedUser.email);
            if (persistedUser.email === 'm.abbas.askri@gmail.com') {
              window.location.href = "admin.html";
            } else {
              window.location.href = "index.html";
            }
          }
        }
      }, 1500);
    }
  });
</script>

</body>
</html>
