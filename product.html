<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details - Girls Fit</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
</head>
<body>

<header style="position:relative;">
  <div class="profile-icon" id="profileIcon" onclick="toggleDropdown()" title="Sign In">👤</div>
  <div class="dropdown-menu" id="dropdownMenu"></div>
  <h1>💖 Girls Fit 💖</h1>
  <nav id="navBar">
    <a href="index.html">Home</a>
    <a href="handbags.html">Handbags</a>
    <a href="pouches.html">Makeup Pouches</a>
    <a href="returns.html">Returns & Refunds</a>
    <a href="orders.html">My Orders</a>
    <a href="cart.html">🛒 Cart</a>
  </nav>
</header>

<section class="products" style="max-width:1100px; margin:auto;">
  <button onclick="goBack()" style="background:#fff0f5;color:#ff5c8a;border:2px solid #ffc1d6;padding:10px 20px;border-radius:25px;cursor:pointer;font-weight:bold;margin-bottom:20px;">← Back</button>
  
  <div id="productDetail" style="background:white;border-radius:20px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,0.1);">
    <p style="text-align:center;color:#888;padding:40px;">Loading product details...</p>
  </div>
</section>

<footer><p>© 2025 Girls Fit 💖 All rights reserved</p></footer>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Get product ID from URL
  function getProductId() {
    var params = new URLSearchParams(window.location.search);
    return parseInt(params.get('id'));
  }

  function updateNav(user) {
    var navBar = document.getElementById('navBar');
    if (user) {
      var ordersLink = user.email === 'm.abbas.askri@gmail.com' ?
        '<a href="admin.html">👩‍💼 Admin</a>' :
        '<a href="orders.html">My Orders</a>';
      navBar.innerHTML =
        '<a href="index.html">Home</a>' +
        '<a href="handbags.html">Handbags</a>' +
        '<a href="pouches.html">Makeup Pouches</a>' +
        '<a href="returns.html">Returns & Refunds</a>' +
        ordersLink +
        '<a href="cart.html">🛒 Cart</a>' +
        '<a href="javascript:void(0)" onclick="logoutUser()" style="background:#ff5c8a;">Logout (' + user.email + ')</a>';
    }
  }

  function updateProfileIcon(user) {
    var icon = document.getElementById('profileIcon');
    var dropdown = document.getElementById('dropdownMenu');
    if (user) {
      icon.innerText = '👤';
      icon.title = user.email;
      dropdown.innerHTML =
        '<a href="' + (user.email === 'm.abbas.askri@gmail.com' ? 'admin.html' : 'orders.html') + '">' +
          (user.email === 'm.abbas.askri@gmail.com' ? '👩‍💼 Admin Panel' : '📦 My Orders') +
        '</a>' +
        '<a href="javascript:void(0)" onclick="logoutUser()">🚪 Logout</a>';
    } else {
      icon.innerText = '👤';
      icon.title = 'Sign In';
      dropdown.innerHTML =
        '<a href="javascript:void(0)" onclick="signInWithGoogle()" class="google-btn">' +
          '<span class="google-icon" style="color:#4285f4;">G</span> Continue with Google' +
        '</a>';
    }
  }

  window.toggleDropdown = function() {
    var dropdown = document.getElementById('dropdownMenu');
    dropdown.classList.toggle('show');
  }

  window.onclick = function(event) {
    if (!event.target.matches('.profile-icon')) {
      var dropdowns = document.getElementsByClassName('dropdown-menu');
      for (var i = 0; i < dropdowns.length; i++) {
        dropdowns[i].classList.remove('show');
      }
    }
  }

  window.addToCart = function(name, price) {
    var user = window.currentFirebaseUser;
    if (!user) {
      alert("Please login to add items to cart!");
      window.location.href = "login.html";
      return;
    }
    var cart = JSON.parse(localStorage.getItem('cart') || '[]');
    cart.push({ name: name, price: price });
    localStorage.setItem('cart', JSON.stringify(cart));
    alert("💖 " + name + " added to cart!");
  };

  window.goBack = function() {
    window.history.back();
  }

  function loadProductDetail(productId) {
    var products = getProducts();
    var product = products.find(function(p) { return p.id === productId; });
    var container = document.getElementById('productDetail');

    if (!product) {
      container.innerHTML = '<p style="text-align:center;color:#888;padding:40px;">Product not found!</p>';
      return;
    }

    // Build image gallery
    var images = product.images || (product.image ? [product.image] : []);
    var imageGallery = '';
    if (images.length > 0) {
      imageGallery = '<div style="display:flex;gap:10px;overflow-x:auto;margin-bottom:20px;padding:10px 0;">';
      images.slice(0, 4).forEach(function(img) {
        imageGallery += '<img src="' + img + '" style="width:100px;height:100px;object-fit:cover;border-radius:10px;flex-shrink:0;" onerror="this.onerror=null;this.style.display=\'none\';">';
      });
      imageGallery += '</div>';
      
      // Main image
      imageGallery = '<div style="text-align:center;margin-bottom:30px;">' +
        '<img src="' + images[0] + '" id="mainProductImage" style="max-width:100%;max-height:400px;object-fit:contain;border-radius:15px;" onerror="this.onerror=null;this.style.display=\'none\';">' +
        '</div>' +
        '<div style="display:flex;gap:10px;overflow-x:auto;padding:10px 0;justify-content:center;">' +
        images.slice(0, 4).map(function(img, idx) {
          return '<img src="' + img + '" onclick="document.getElementById(\'mainProductImage\').src=this.src" style="width:80px;height:80px;object-fit:cover;border-radius:10px;cursor:pointer;flex-shrink:0;border:2px solid ' + (idx === 0 ? '#ff5c8a' : '#ffc1d6') + ';" onerror="this.onerror=null;this.style.display=\'none\';">';
        }).join('') +
        '</div>';
    } else {
      imageGallery = '<div style="text-align:center;margin-bottom:30px;color:#ccc;padding:40px;background:#fff0f5;border-radius:15px;">No Image Available</div>';
    }

    container.innerHTML =
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;">' +
        '<div>' +
          imageGallery +
        '</div>' +
        '<div>' +
          '<h2 style="color:#ff5c8a;margin-bottom:10px;">' + (product.name || '') + '</h2>' +
          '<p style="font-size:2em;font-weight:bold;color:#ff8ab3;margin-bottom:20px;">₨' + (product.price || 0) + '</p>' +
          '<p style="color:#666;line-height:1.6;margin-bottom:20px;">' + (product.description || 'No description available.') + '</p>' +
          '<p style="margin-bottom:10px;"><b>Category:</b> ' + (product.category === 'handbag' ? '👜 Handbag' : '💄 Makeup Pouch') + '</p>' +
          (product.featured ? '<p style="color:#ff5c8a;margin-bottom:20px;">✅ Featured Product</p>' : '') +
          '<button onclick="addToCart(\'' + (product.name || '').replace(/'/g, "\\'") + '\', ' + (product.price || 0) + ')" style="background:#ff8ab3;color:white;border:none;padding:14px 30px;border-radius:25px;cursor:pointer;font-weight:bold;font-size:1.1em;width:100%;">Add to Cart 💖</button>' +
        '</div>' +
      '</div>';
  }

  var authHandled = false;
  firebase.auth().onAuthStateChanged(function(user) {
    if (authHandled) return;
    if (user) {
      authHandled = true;
      window.currentFirebaseUser = user;
      updateProfileIcon(user);
      updateNav(user);
      loadProductDetail(getProductId());
    } else {
      setTimeout(function() {
        if (!authHandled) {
          authHandled = true;
          var persistedUser = firebase.auth().currentUser;
          window.currentFirebaseUser = persistedUser;
          if (persistedUser) {
            updateProfileIcon(persistedUser);
            updateNav(persistedUser);
          }
          loadProductDetail(getProductId());
        }
      }, 1500);
    }
  });
});
</script>
