<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📦 My Orders - Girls Fit</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
</head>
<body>

<header style="position:relative;">
  <div class="profile-icon" id="profileIcon" onclick="toggleDropdown()" title="Sign In">👤</div>
  <div class="dropdown-menu" id="dropdownMenu"></div>
  <h1>💖 Girls Fit 💖</h1>
  <nav id="navBar">
    <a href="index.html">Home</a>
    <a href="handbags.html">Handbags</a>
    <a href="pouches.html">Makeup Pouches</a>
    <a href="returns.html">Returns & Refunds</a>
    <a href="orders.html" class="active">My Orders</a>
    <a href="cart.html">🛒 Cart</a>
  </nav>
</header>

<section class="products">
  <h2>📦 My Orders</h2>
  <div id="ordersContainer" style="max-width:1100px;margin:auto;"></div>
</section>

<footer><p>© 2025 Girls Fit 💖 All rights reserved</p></footer>

<script>
document.addEventListener('DOMContentLoaded', function() {
  function updateNav(user) {
    var navBar = document.getElementById('navBar');
    if (user) {
      var ordersLink = user.email === 'm.abbas.askri@gmail.com' ?
        '<a href="admin.html">👩‍💼 Admin</a>' :
        '<a href="orders.html" class="active">My Orders</a>';
      navBar.innerHTML =
        '<a href="index.html">Home</a>' +
        '<a href="handbags.html">Handbags</a>' +
        '<a href="pouches.html">Makeup Pouches</a>' +
        '<a href="returns.html">Returns & Refunds</a>' +
        ordersLink +
        '<a href="cart.html">🛒 Cart</a>' +
        '<a href="javascript:void(0)" onclick="logoutUser()" style="background:#ff5c8a;">Logout (' + user.email + ')</a>';
    }
  }

  function updateProfileIcon(user) {
    var icon = document.getElementById('profileIcon');
    var dropdown = document.getElementById('dropdownMenu');
    if (user) {
      icon.innerText = '👤';
      icon.title = user.email;
      dropdown.innerHTML =
        '<a href="' + (user.email === 'm.abbas.askri@gmail.com' ? 'admin.html' : 'orders.html') + '">' +
          (user.email === 'm.abbas.askri@gmail.com' ? '👩‍💼 Admin Panel' : '📦 My Orders') +
        '</a>' +
        '<a href="javascript:void(0)" onclick="logoutUser()">🚪 Logout</a>';
    } else {
      icon.innerText = '👤';
      icon.title = 'Sign In';
      dropdown.innerHTML =
        '<a href="javascript:void(0)" onclick="signInWithGoogle()" class="google-btn">' +
          '<span class="google-icon" style="color:#4285f4;">G</span> Continue with Google' +
        '</a>';
    }
  }

  window.toggleDropdown = function() {
    var dropdown = document.getElementById('dropdownMenu');
    dropdown.classList.toggle('show');
  }

  window.onclick = function(event) {
    if (!event.target.matches('.profile-icon')) {
      var dropdowns = document.getElementsByClassName('dropdown-menu');
      for (var i = 0; i < dropdowns.length; i++) {
        dropdowns[i].classList.remove('show');
      }
    }
  }

  window.signInWithGoogle = function() {
    var provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
      .then(function(result) {
        var user = result.user;
        window.currentFirebaseUser = user;
        if (user.email === 'm.abbas.askri@gmail.com') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'orders.html';
        }
      })
      .catch(function(error) {
        console.error("Google sign-in error:", error);
      });
  };

  window.logoutUser = function() {
    firebase.auth().signOut().then(function() {
      window.location.href = "login.html";
    });
  };

  function loadUserOrders(user) {
    var orders = getOrders().filter(function(o) { return o.customerEmail === user.email; });
    var container = document.getElementById('ordersContainer');
    if (!container) return;

    if (orders.length === 0) {
      container.innerHTML = '<p style="text-align:center;padding:20px;color:#888;">No orders yet. <a href="index.html">Start shopping!</a></p>';
      return;
    }

    var html = '<table><thead><tr><th>Order ID</th><th>Product</th><th>Date</th><th>Price</th><th>Status</th></tr></thead><tbody>';
    orders.forEach(function(o) {
      html += '<tr>' +
        '<td>' + (o.id || '') + '</td>' +
        '<td>' + (o.productName || '') + '</td>' +
        '<td>' + (o.date || '') + '</td>' +
        '<td>₨' + (o.price || 0) + '</td>' +
        '<td><span class="status ' + (o.status || 'pending') + '">' + getStatusText(o.status) + '</span></td>' +
      '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function getStatusText(status) {
    switch(status) {
      case 'pending': return 'Pending 📋';
      case 'processing': return 'Processing ⏳';
      case 'shipped': return 'Shipped 🚚';
      case 'delivered': return 'Delivered ✅';
      case 'cancelled': return 'Cancelled ❌';
      default: return status || 'Pending';
    }
  }

  // Auth handling
  var authHandled = false;
  firebase.auth().onAuthStateChanged(function(user) {
    if (authHandled) return;
    if (user) {
      authHandled = true;
      window.currentFirebaseUser = user;
      updateProfileIcon(user);
      updateNav(user);
      loadUserOrders(user);
    } else {
      setTimeout(function() {
        if (!authHandled) {
          authHandled = true;
          var persistedUser = firebase.auth().currentUser;
          window.currentFirebaseUser = persistedUser;
          if (persistedUser) {
            updateProfileIcon(persistedUser);
            updateNav(persistedUser);
            loadUserOrders(persistedUser);
          } else {
            window.location.href = "login.html";
          }
        }
      }, 1500);
    }
  });
});
</script>
