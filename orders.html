<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📦 My Orders - Girls Fit</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
</head>
<script>
  // Firebase already initialized by firebase-config.js

  function updateNav(user) {
    const navBar = document.getElementById('navBar');
    if (user) {
      const ordersLink = user.email === 'm.abbas.askri@gmail.com' ?
        '<a href="admin.html">👩‍💼 Admin</a>' :
        '<a href="orders.html" class="active">My Orders</a>';
      navBar.innerHTML = `
        <a href="index.html">Home</a>
        <a href="handbags.html">Handbags</a>
        <a href="pouches.html">Makeup Pouches</a>
        <a href="returns.html">Returns & Refunds</a>
        ${ordersLink}
        <a href="cart.html">🛒 Cart</a>
        <a href="javascript:void(0)" onclick="logoutUser()" style="background:#ff5c8a;">Logout (${user.email})</a>
      `;
    }
  }

  function updateProfileIcon(user) {
    const icon = document.getElementById('profileIcon');
    const dropdown = document.getElementById('dropdownMenu');
    if (user) {
      icon.innerText = '👤';
      icon.title = user.email;
      dropdown.innerHTML = `
        <a href="${user.email === 'm.abbas.askri@gmail.com' ? 'admin.html' : 'orders.html'}">
          ${user.email === 'm.abbas.askri@gmail.com' ? '👩‍💼 Admin Panel' : '📦 My Orders'}
        </a>
        <a href="javascript:void(0)" onclick="logoutUser()">🚪 Logout</a>
      `;
    } else {
      icon.innerText = '👤';
      icon.title = 'Sign In';
      dropdown.innerHTML = `
        <a href="javascript:void(0)" onclick="signInWithGoogle()" class="google-btn">
          <span class="google-icon" style="color:#4285f4;">G</span> Continue with Google
        </a>
      `;
    }
  }

  window.toggleDropdown = function() {
    const dropdown = document.getElementById('dropdownMenu');
    dropdown.classList.toggle('show');
  }

  window.onclick = function(event) {
    if (!event.target.matches('.profile-icon')) {
      const dropdowns = document.getElementsByClassName('dropdown-menu');
      for (let i = 0; i < dropdowns.length; i++) {
        dropdowns[i].classList.remove('show');
      }
    }
  }

  window.signInWithGoogle = function() {
    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
      .then((result) => {
        const user = result.user;
        window.currentFirebaseUser = user;
        if (user.email === 'm.abbas.askri@gmail.com') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'orders.html';
        }
      })
      .catch((error) => {
        console.error("Google sign-in error:", error);
      });
  };

  window.logoutUser = function() {
    firebase.auth().signOut().then(() => {
      window.location.href = "login.html";
    });
  };

  function loadUserOrders(user) {
    const orders = getOrders().filter(o => o.customerEmail === user.email);
    const container = document.getElementById('ordersContainer');

    if (orders.length === 0) {
      container.innerHTML = '<p style="text-align:center;padding:20px;color:#888;">No orders yet. <a href="index.html">Start shopping!</a></p>';
      return;
    }

    let html = '<table><thead><tr><th>Order ID</th><th>Product</th><th>Date</th><th>Price</th><th>Status</th></tr></thead><tbody>';
    orders.forEach(o => {
      html += `<tr>
        <td>${o.id}</td>
        <td>${o.productName}</td>
        <td>${o.date}</td>
        <td>₨${o.price}</td>
        <td><span class="status ${o.status}">${getStatusText(o.status)}</span></td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function getStatusText(status) {
    switch(status) {
      case 'pending': return 'Pending 📋';
      case 'processing': return 'Processing ⏳';
      case 'shipped': return 'Shipped 🚚';
      case 'delivered': return 'Delivered ✅';
      case 'cancelled': return 'Cancelled ❌';
      default: return status;
    }
  }

  // Auth handling that waits for persistence to restore before acting on null
  let authHandled = false;
  firebase.auth().onAuthStateChanged((user) => {
    if (authHandled) return;
    if (user) {
      authHandled = true;
      window.currentFirebaseUser = user;
      updateProfileIcon(user);
      updateNav(user);
      loadUserOrders(user);
    } else {
      setTimeout(() => {
        if (!authHandled) {
          authHandled = true;
          const persistedUser = firebase.auth().currentUser;
          window.currentFirebaseUser = persistedUser;
          if (persistedUser) {
            updateProfileIcon(persistedUser);
            updateNav(persistedUser);
            loadUserOrders(persistedUser);
          } else {
            window.location.href = "login.html";
          }
        }
      }, 1500);
    }
  });
  </script>
