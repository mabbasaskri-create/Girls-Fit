<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💄 Makeup Pouches - Girls Fit</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
</head>
<body>

<header style="position:relative;">
  <div class="profile-icon" id="profileIcon" onclick="toggleDropdown()" title="Sign In">👤</div>
  <div class="dropdown-menu" id="dropdownMenu">
    <a href="javascript:void(0)" onclick="signInWithGoogle()" class="google-btn">
      <span class="google-icon">G</span> Continue with Google
    </a>
  </div>
  <h1>💖 Girls Fit 💖</h1>
  <nav id="navBar">
    <a href="index.html">Home</a>
    <a href="handbags.html">Handbags</a>
    <a href="pouches.html" class="active">Makeup Pouches</a>
    <a href="returns.html">Returns & Refunds</a>
    <a href="orders.html">My Orders</a>
    <a href="cart.html">🛒 Cart</a>
  </nav>
</header>

<section class="products">
  <h2>💄 Makeup Pouches 💄</h2>
  <div class="product-grid" id="pouchesGrid"></div>
</section>

<footer><p>© 2025 Girls Fit 💖 All rights reserved</p></footer>

<script>
// Update nav based on auth state
function updateNav(user) {
  var navBar = document.getElementById('navBar');
  if (user) {
    var ordersLink = user.email === 'm.abbas.askri@gmail.com' ?
      '<a href="admin.html">👩‍💼 Admin</a>' :
      '<a href="orders.html">My Orders</a>';
    navBar.innerHTML =
      '<a href="index.html">Home</a>' +
      '<a href="handbags.html">Handbags</a>' +
      '<a href="pouches.html" class="active">Makeup Pouches</a>' +
      '<a href="returns.html">Returns & Refunds</a>' +
      ordersLink +
      '<a href="cart.html">🛒 Cart</a>' +
      '<a href="javascript:void(0)" onclick="logoutUser()" style="background:#ff5c8a;">Logout (' + user.email + ')</a>';
  }
}

function updateProfileIcon(user) {
  var icon = document.getElementById('profileIcon');
  var dropdown = document.getElementById('dropdownMenu');
  if (user) {
    icon.innerText = '👤';
    icon.title = user.email;
    dropdown.innerHTML =
      '<a href="' + (user.email === 'm.abbas.askri@gmail.com' ? 'admin.html' : 'orders.html') + '">' +
        (user.email === 'm.abbas.askri@gmail.com' ? '👩‍💼 Admin Panel' : '📦 My Orders') +
      '</a>' +
      '<a href="javascript:void(0)" onclick="logoutUser()">🚪 Logout</a>';
  } else {
    icon.innerText = '👤';
    icon.title = 'Sign In';
    dropdown.innerHTML =
      '<a href="javascript:void(0)" onclick="signInWithGoogle()" class="google-btn">' +
        '<span class="google-icon" style="color:#4285f4;">G</span> Continue with Google' +
      '</a>';
  }
}

window.toggleDropdown = function() {
  var dropdown = document.getElementById('dropdownMenu');
  dropdown.classList.toggle('show');
}

window.onclick = function(event) {
  if (!event.target.matches('.profile-icon')) {
    var dropdowns = document.getElementsByClassName('dropdown-menu');
    for (var i = 0; i < dropdowns.length; i++) {
      dropdowns[i].classList.remove('show');
    }
  }
}

window.signInWithGoogle = function() {
  var provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider)
    .then(function(result) {
      var user = result.user;
      window.currentFirebaseUser = user;
      if (user.email === 'm.abbas.askri@gmail.com') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'pouches.html';
      }
    })
    .catch(function(error) {
      console.error("Google sign-in error:", error);
    });
};

window.logoutUser = function() {
  firebase.auth().signOut().then(function() {
    window.location.href = "login.html";
  });
};

// Load pouches - use localStorage directly
function loadPouches() {
  try {
    var products = JSON.parse(localStorage.getItem('products')) || [];
    var pouches = products.filter(function(p) { return p.category === 'pouch'; });
    var container = document.getElementById('pouchesGrid');
    if (!container) return;
    container.innerHTML = '';
    if (!pouches.length) {
      container.innerHTML = '<p style="text-align:center;color:#888;grid-column:1/-1;">No makeup pouches available yet.</p>';
      return;
    }
    pouches.forEach(function(p) {
      var imgTag = p.image
        ? '<div style="width:100%;height:220px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:10px;margin-bottom:10px;background:#fff0f5;">' +
            '<img src="' + p.image + '" alt="' + p.name + '" style="max-width:100%;max-height:100%;object-fit:contain;" onerror="this.onerror=null;this.style.display=\'none\';">' +
          '</div>'
        : '<div style="width:100%;height:220px;display:flex;align-items:center;justify-content:center;background:#fff0f5;border-radius:10px;margin-bottom:10px;color:#ccc;">No Image</div>';
      var safeName = (p.name || '').replace(/'/g, "\\'");
      container.innerHTML +=
        '<div class="product-card">' +
          imgTag +
          '<h3>' + (p.name || '') + '</h3>' +
          '<p>₨' + (p.price || 0) + '</p>' +
          '<button onclick="addToCart(\'' + safeName + '\', ' + (p.price || 0) + ')">Add to Cart</button>' +
        '</div>';
    });
  } catch(err) {
    console.error('loadPouches error:', err);
  }
}

window.addToCart = function(name, price) {
  var user = window.currentFirebaseUser;
  if (!user) {
    alert("Please login to add items to cart!");
    window.location.href = "login.html";
    return;
  }
  var cart = JSON.parse(localStorage.getItem('cart')) || [];
  cart.push({ name: name, price: price });
  localStorage.setItem('cart', JSON.stringify(cart));
  alert("💖 " + name + " added to cart!");
};

// Load products on page load (no auth required for viewing)
loadPouches();

// Auth handling for nav/profile updates
var authHandled = false;
firebase.auth().onAuthStateChanged(function(user) {
  if (authHandled) return;
  if (user) {
    authHandled = true;
    window.currentFirebaseUser = user;
    updateProfileIcon(user);
    updateNav(user);
  } else {
    setTimeout(function() {
      if (!authHandled) {
        authHandled = true;
        var persistedUser = firebase.auth().currentUser;
        window.currentFirebaseUser = persistedUser;
        if (persistedUser) {
          updateProfileIcon(persistedUser);
          updateNav(persistedUser);
        }
      }
    }, 1500);
  }
});
</script>

</body>
</html>
